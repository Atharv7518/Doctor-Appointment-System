<!DOCTYPE html>
<html>
<head>
    <title>Doctor Login</title>
</head>
<body>

<h2>Doctor Login</h2>

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <label>Email</label><br>
    <input type="email" name="email"><br><br>

    <label>Password</label><br>
    <input type="password" name="password"><br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
