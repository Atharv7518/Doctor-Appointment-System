<!DOCTYPE html>
<html>
<head>
    <title>Doctor Registration</title>
</head>
<body>

<h2>Doctor Registration</h2>

{% if success %}
<p style="color:green;">
    {{ success }}
</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <label>First Name</label><br>
    <input type="text" name="first_name" required><br><br>

    <label>Last Name</label><br>
    <input type="text" name="last_name" required><br><br>

    <label>Gender</label><br>
    <select name="gender" required>
        <option value="">--Select Gender--</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select><br><br>

    <label>Specialization</label><br>
    <select name="specialization" required>
        <option value="">--Select Specialization--</option>
        <option value="Cardiologist">Cardiologist</option>
        <option value="Dermatologist">Dermatologist</option>
        <option value="Neurologist">Neurologist</option>
        <option value="Orthopedic">Orthopedic</option>
        <option value="Pediatrician">Pediatrician</option>
        <option value="Dentist">Dentist</option>
        <option value="General Physician">General Physician</option>
    </select><br><br>

    <label>Qualification</label><br>
    <input type="text" name="qualification" required><br><br>

    <label>Experience (Years)</label><br>
    <input type="number" name="experience" required><br><br>

    <label>Phone</label><br>
    <input type="text" name="phone" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password</label><br>
    <input type="password" name="password" required><br><br>

    <label>Consultation Fee</label><br>
    <input type="number" step="0.01" name="consultation_fee" required><br><br>

    <label>Available Days</label><br>
    <input type="text" name="available_days" placeholder="Mon-Fri" required><br><br>

    <label>Available Time</label><br>
    <input type="text" name="available_time" placeholder="10:00 AM - 5:00 PM" required><br><br>

    <button type="submit">Register</button>

</form>

</body>
</html>
