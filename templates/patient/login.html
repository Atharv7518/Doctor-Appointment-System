<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Custom UI Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            overflow-x: hidden;
        }
        
        .split-layout {
            min-height: 100vh;
        }
        
        /* Left Side Illustration */
        .hospital-bg {
            background-image: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(13, 110, 253, 0.9) 0%, rgba(10, 88, 202, 0.95) 100%);
            z-index: 1;
        }
        
        .hero-content {
            z-index: 2;
            position: relative;
        }

        /* Form Styling */
        .form-control-custom {
            border-radius: 12px;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }
        
        .form-control-custom:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
        }
        
        .input-icon {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: #6c757d;
            z-index: 10;
        }
        
        .btn-login {
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.25);
        }

        /* Animations */
        .fade-in-up {
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0 split-layout">
            
            <div class="col-lg-6 d-none d-lg-flex hospital-bg align-items-center justify-content-center">
                <div class="bg-overlay"></div>
                <div class="hero-content text-center text-white p-5 fade-in-up">
                    <div class="mb-4 bg-white text-primary rounded-circle d-inline-flex align-items-center justify-content-center shadow-lg" style="width: 80px; height: 80px;">
                        <i class="fa-solid fa-house-medical fa-2x"></i>
                    </div>
                    <h1 class="display-5 fw-bold mb-3">Healthcare Management</h1>
                    <p class="lead fw-light opacity-75 mx-auto" style="max-width: 400px;">
                        Securely access your medical portal to book appointments, view records, and connect with professionals.
                    </p>
                </div>
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white p-4 p-sm-5">
                <div class="w-100" style="max-width: 420px;">
                    
                    <div class="text-center d-lg-none mb-4 fade-in-up">
                        <i class="fa-solid fa-house-medical fa-3x text-primary mb-2"></i>
                    </div>

                    <div class="mb-5 fade-in-up">
                        <h2 class="fw-bold text-dark mb-2">Patient Login</h2>
                        <p class="text-muted">Welcome back! Please enter your details.</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show fade-in-up border-0 shadow-sm" role="alert" style="border-radius: 12px;">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endif %}

                    <form method="POST" class="fade-in-up delay-1">
                        
                        {% csrf_token %}

                        <div class="mb-4 position-relative">
                            <label class="form-label fw-semibold small text-dark">Email Address</label>
                            <div class="position-relative">
                                <i class="fa-regular fa-envelope input-icon"></i>
                                <input type="email" name="email" class="form-control form-control-custom" placeholder="name@example.com" required>
                            </div>
                        </div>

                        <div class="mb-4 position-relative">
                            <label class="form-label fw-semibold small text-dark">Password</label>
                            <div class="position-relative">
                                <i class="fa-solid fa-lock input-icon"></i>
                                <input type="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 fade-in-up delay-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small text-muted user-select-none" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none small fw-semibold">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-login mb-4 fade-in-up delay-3 shadow-sm">
                            Login <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>

                        <div class="text-center mt-4 fade-in-up delay-3">
                            <a href="/" class="text-muted text-decoration-none small fw-medium transition-all hover-primary">
                                <i class="fa-solid fa-arrow-left me-1"></i> Back to Home
                            </a>
                        </div>
                        
                    </form>
                </div>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
