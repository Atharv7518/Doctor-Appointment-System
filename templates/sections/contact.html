<section id="contact" class="section-padding bg-white">
  <div class="container">
    <div class="row bg-light-theme rounded-custom shadow-sm overflow-hidden">
      <div class="col-lg-5 text-white p-5 d-flex flex-column justify-content-center" style="background: linear-gradient(135deg, var(--primary-blue), var(--accent-blue));">
        <h3 class="fw-bold mb-4">Get In Touch</h3>
        <p class="mb-4">We are here to help you 24/7.</p>
        <div class="d-flex align-items-center mb-4">
          <i class="fas fa-phone-alt fa-2x me-3"></i>
          <div>
            <h6 class="fw-bold mb-0">Emergency Contact</h6>
            <span>+1 (800) 123-4567</span>
          </div>
        </div>
      </div>
      <div class="col-lg-7 p-5">
        <h3 class="fw-bold mb-4">Book an Appointment</h3>
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" class="form-control form-control-lg bg-white" placeholder="Full Name" required>
            </div>
            <div class="col-md-6">
              <input type="email" class="form-control form-control-lg bg-white" placeholder="Email Address" required>
            </div>
            <div class="col-12 mt-4">
              <button type="submit" class="btn btn-gradient btn-lg w-100 rounded-pill fw-bold">Submit Request</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
